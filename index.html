<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sonisanantes – Musik</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#050608">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Soni Musik">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Cinzel:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    button, a { touch-action: manipulation; -webkit-tap-highlight-color: rgba(212,168,32,.18); }
    @media (hover: none) {
      .track-card:hover, .ctrl-btn:hover, .tab-btn:hover, .add-btn:hover { transform: none !important; }
    }

    :root {
      --bg: #050608;
      --surface: rgba(255,255,255,.04);
      --surface2: rgba(255,255,255,.08);
      --gold: #D4A820;
      --gold-light: #F5ECD0;
      --cream: #F5ECD0;
      --violet: #7B2D9E;
      --magenta: #C4257A;
      --turquoise: #44D6D6;
      --text: rgba(255,255,255,.92);
      --text-dim: rgba(255,255,255,.42);
      --player-h: 116px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --serif: 'Cormorant Garamond', Georgia, serif;
      --display: 'Cinzel', Georgia, serif;
      --sans: 'Inter', -apple-system, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Ambient background ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse at 15% 20%, rgba(123,45,158,.18) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 25%, rgba(68,214,214,.07) 0%, transparent 45%),
        radial-gradient(ellipse at 50% 95%, rgba(196,37,122,.12) 0%, transparent 50%),
        radial-gradient(ellipse at 75% 65%, rgba(63,184,155,.05) 0%, transparent 45%);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 15% 28%, rgba(255,255,255,.45), transparent),
        radial-gradient(1px 1px at 55% 68%, rgba(255,255,255,.3), transparent),
        radial-gradient(1px 1px at 78% 18%, rgba(255,255,255,.38), transparent),
        radial-gradient(1px 1px at 32% 82%, rgba(255,255,255,.28), transparent),
        radial-gradient(1px 1px at 88% 55%, rgba(255,255,255,.32), transparent),
        radial-gradient(1px 1px at 42% 42%, rgba(255,255,255,.2), transparent),
        radial-gradient(1px 1px at 68% 88%, rgba(255,255,255,.25), transparent);
      opacity: .55;
    }

    /* ── Header / Logo ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(5,6,8,.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(212,168,32,.15);
      padding: 14px 20px 10px;
      text-align: center;
    }
    .logo-name {
      font-family: var(--display);
      font-size: clamp(1.1rem, 4vw, 1.6rem);
      font-weight: 500;
      letter-spacing: .22em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #D4A820, #F5ECD0, #D4A820);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-sub {
      font-family: var(--sans);
      font-size: .62rem;
      letter-spacing: .45em;
      text-transform: uppercase;
      color: var(--turquoise);
      margin-top: 3px;
      font-weight: 400;
    }
    .divider {
      width: 120px; height: 1px; margin: 8px auto 0;
      background: linear-gradient(90deg, transparent, rgba(212,168,32,.45), transparent);
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid rgba(212,168,32,.12);
      position: relative; z-index: 1;
    }
    .tab-btn {
      flex: 1;
      padding: 11px 8px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
    }
    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }
    .tab-btn .badge {
      display: inline-block;
      background: var(--gold);
      color: #050608;
      font-size: 9px;
      font-weight: 700;
      border-radius: 10px;
      padding: 1px 6px;
      margin-left: 5px;
      font-family: var(--sans);
      letter-spacing: 0;
      text-transform: none;
    }

    /* ── Main ── */
    main {
      padding-bottom: calc(var(--player-h) + var(--safe-bottom) + 20px);
      position: relative; z-index: 1;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Section label ── */
    .section-label {
      padding: 18px 20px 10px;
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* ── Track list ── */
    .track-list { padding: 0 10px 8px; }

    .track-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: background .15s;
      border: 1px solid transparent;
      margin-bottom: 2px;
    }
    .track-card:active { background: rgba(212,168,32,.06); }
    .track-card.playing {
      background: rgba(212,168,32,.07);
      border-color: rgba(212,168,32,.18);
    }
    .track-card.selected {
      background: rgba(123,45,158,.1);
      border-color: rgba(123,45,158,.2);
    }

    .thumb-wrap {
      position: relative;
      flex-shrink: 0;
      width: 58px; height: 58px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,.4);
    }
    .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .thumb-wrap .play-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .2s;
    }
    .track-card.playing .play-overlay { opacity: 1; }
    .play-overlay svg { width: 22px; height: 22px; fill: var(--gold); }

    .track-info { flex: 1; min-width: 0; }
    .track-title {
      font-family: var(--serif);
      font-size: 15px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
      color: var(--cream);
      letter-spacing: .01em;
    }
    .track-card.playing .track-title { color: var(--gold-light); }
    .track-meta {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: .04em;
    }

    .track-actions { flex-shrink: 0; }
    .add-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1.5px solid rgba(212,168,32,.3);
      background: none;
      color: rgba(212,168,32,.6);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all .2s;
      font-size: 17px;
      line-height: 1;
    }
    .track-card.selected .add-btn {
      background: var(--gold);
      border-color: var(--gold);
      color: #050608;
      font-size: 13px;
    }

    /* ── Playlist tab ── */
    .playlist-empty {
      text-align: center;
      padding: 60px 30px;
      color: var(--text-dim);
    }
    .playlist-empty .icon {
      font-size: 42px;
      margin-bottom: 16px;
      filter: grayscale(30%);
    }
    .playlist-empty p {
      font-family: var(--serif);
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-dim);
    }

    .playlist-controls {
      display: flex;
      gap: 10px;
      padding: 14px 16px 6px;
    }
    .btn-sm {
      padding: 9px 18px;
      border-radius: 20px;
      border: none;
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .btn-play-all {
      background: linear-gradient(135deg, var(--gold), #b8900e);
      color: #050608;
      font-weight: 600;
      flex: 1;
    }
    .btn-clear {
      background: rgba(255,255,255,.06);
      color: var(--text-dim);
      border: 1px solid rgba(255,255,255,.1);
    }

    .playlist-track {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      margin: 0 10px 3px;
      border-radius: 8px;
      background: rgba(255,255,255,.03);
      border: 1px solid transparent;
      cursor: pointer;
      transition: background .15s;
    }
    .playlist-track.playing-now {
      background: rgba(212,168,32,.07);
      border-color: rgba(212,168,32,.2);
    }
    .playlist-num { font-size: 11px; color: var(--text-dim); width: 18px; text-align: center; flex-shrink: 0; }
    .playlist-thumb { width: 42px; height: 42px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
    .playlist-info { flex: 1; min-width: 0; }
    .playlist-title { font-family: var(--serif); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--cream); }
    .playlist-duration { font-size: 11px; color: var(--text-dim); }
    .remove-btn {
      background: none; border: none;
      color: var(--text-dim); cursor: pointer;
      font-size: 18px; padding: 4px; flex-shrink: 0;
    }

    /* ── Player bar ── */
    #player-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(var(--player-h) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: rgba(8,5,15,.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(212,168,32,.2);
      box-shadow: 0 -12px 40px rgba(0,0,0,.6);
      z-index: 200;
      display: flex;
      flex-direction: column;
    }
    .player-progress {
      height: 2px;
      background: rgba(212,168,32,.12);
      cursor: pointer;
      flex-shrink: 0;
    }
    .player-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--violet), var(--magenta), var(--gold));
      width: 0%;
      transition: width .5s linear;
      pointer-events: none;
    }
    .player-inner {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      flex: 1;
    }
    #now-thumb {
      width: 48px; height: 48px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(255,255,255,.05);
      box-shadow: 0 4px 12px rgba(0,0,0,.4);
    }
    .now-info { flex: 1; min-width: 0; }
    #now-title {
      font-family: var(--serif);
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
      color: var(--cream);
    }
    #now-status { font-size: 10px; color: var(--text-dim); letter-spacing: .06em; }

    .controls {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }
    .ctrl-btn {
      background: none; border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: color .15s;
    }
    .ctrl-btn:active { color: var(--gold); }
    .ctrl-btn svg { width: 20px; height: 20px; fill: currentColor; }
    .ctrl-btn.main {
      color: var(--gold);
      background: rgba(212,168,32,.1);
      border: 1px solid rgba(212,168,32,.25);
      margin: 0 4px;
    }
    .ctrl-btn.main svg { width: 32px; height: 32px; }
    .ctrl-btn.main:active { background: rgba(212,168,32,.2); }

    /* ── Hidden YouTube player ── */
    #yt-player { position: fixed; width: 1px; height: 1px; top: -1px; left: -1px; opacity: 0; pointer-events: none; }

    /* ── Loading shimmer ── */
    .loading-tracks {
      padding: 30px 20px;
      text-align: center;
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .loading-tracks::after {
      content: '';
      display: block;
      width: 60px; height: 1px;
      margin: 14px auto 0;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      animation: shimmer 1.6s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { opacity: .3; } 50% { opacity: 1; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-name">Sonisanantes</div>
  <div class="logo-sub">Musik</div>
  <div class="divider"></div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('alle')">Alle Tracks</button>
  <button class="tab-btn" onclick="showTab('playlist')" id="tab-playlist-btn">
    Meine Playlist <span class="badge" id="playlist-badge" style="display:none">0</span>
  </button>
</div>

<main>
  <div class="tab-panel active" id="tab-alle">
    <div class="section-label">Alle Veröffentlichungen</div>
    <div class="track-list" id="track-list">
      <div class="loading-tracks">Tracks werden geladen</div>
    </div>
  </div>

  <div class="tab-panel" id="tab-playlist">
    <div id="playlist-empty" class="playlist-empty">
      <div class="icon">♫</div>
      <p>Tippe auf <strong style="color:var(--gold)">+</strong> bei einem Track,<br>um ihn deiner Playlist hinzuzufügen.</p>
    </div>
    <div id="playlist-content" style="display:none">
      <div class="playlist-controls">
        <button class="btn-sm btn-play-all" onclick="playAll()">▶ Alles abspielen</button>
        <button class="btn-sm btn-clear" onclick="clearPlaylist()">Leeren</button>
      </div>
      <div id="playlist-list"></div>
    </div>
  </div>
</main>

<div id="player-bar">
  <div class="player-progress" id="progress-bar" onclick="seekTo(event)">
    <div class="player-progress-fill" id="progress-fill"></div>
  </div>
  <div class="player-inner">
    <img id="now-thumb" src="logo.png" alt="Sonisanantes">
    <div class="now-info">
      <div id="now-title">Kein Track ausgewählt</div>
      <div id="now-status">Tippe auf einen Track</div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="prevTrack()" title="Zurück">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn main" id="play-pause-btn" onclick="togglePlay()">
        <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="nextTrack()" title="Weiter">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2.5-6 8.5 6V6L8.5 12zM16 6h2v12h-2z"/></svg>
      </button>
    </div>
  </div>
</div>

<div id="yt-player"></div>

<script>
const YT_API_KEY = 'AIzaSyA2R2drwdoSrSQ-WJzwZ5WcBZQggD8Z0cM';
let TRACKS = [];

function parseDuration(iso) {
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return '';
  const h = parseInt(m[1] || 0), min = parseInt(m[2] || 0), s = parseInt(m[3] || 0);
  if (h > 0) return `${h}:${String(min).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${min}:${String(s).padStart(2,'0')}`;
}

async function loadChannelTracks() {
  try {
    const chRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=contentDetails&forHandle=sonisanantes&key=${YT_API_KEY}`);
    const chData = await chRes.json();
    const uploadsId = chData.items[0].contentDetails.relatedPlaylists.uploads;

    let videos = [], pageToken = '';
    do {
      const res = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadsId}&maxResults=50&pageToken=${pageToken}&key=${YT_API_KEY}`);
      const data = await res.json();
      videos = videos.concat(data.items || []);
      pageToken = data.nextPageToken || '';
    } while (pageToken);

    const ids = videos.map(v => v.snippet.resourceId.videoId);
    const durations = {};
    for (let i = 0; i < ids.length; i += 50) {
      const batch = ids.slice(i, i + 50).join(',');
      const dRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${batch}&key=${YT_API_KEY}`);
      const dData = await dRes.json();
      (dData.items || []).forEach(v => { durations[v.id] = parseDuration(v.contentDetails.duration); });
    }

    TRACKS = videos.map(v => ({
      id: v.snippet.resourceId.videoId,
      title: v.snippet.title,
      duration: durations[v.snippet.resourceId.videoId] || '',
    }));

    renderTracks();
  } catch (err) {
    document.getElementById('track-list').innerHTML =
      `<div style="padding:24px 20px;color:rgba(212,168,32,.5);font-size:13px;text-align:center">Fehler beim Laden – bitte neu laden.<br><small style="opacity:.6">${err.message}</small></div>`;
  }
}

function thumb(id) { return `https://img.youtube.com/vi/${id}/mqdefault.jpg`; }

let ytPlayer = null, ytReady = false;
let currentTrackIdx = null, playlist = [], isPlaying = false, queueIdx = null;

const tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

window.onYouTubeIframeAPIReady = function() {
  ytPlayer = new YT.Player('yt-player', {
    height: '1', width: '1',
    playerVars: { autoplay: 0, controls: 0, modestbranding: 1 },
    events: { onReady: () => { ytReady = true; }, onStateChange: onPlayerStateChange }
  });
};

function onPlayerStateChange(e) {
  if (e.data === YT.PlayerState.PLAYING) { isPlaying = true; setPlayIcon(true); startProgressUpdate(); }
  else if (e.data === YT.PlayerState.PAUSED) { isPlaying = false; setPlayIcon(false); stopProgressUpdate(); }
  else if (e.data === YT.PlayerState.ENDED) { nextTrack(); }
}

function renderTracks() {
  const list = document.getElementById('track-list');
  list.innerHTML = TRACKS.map((t, i) => {
    const sel = playlist.includes(t.id);
    const playing = currentTrackIdx === i;
    return `
      <div class="track-card ${sel ? 'selected' : ''} ${playing ? 'playing' : ''}" id="card-${i}" onclick="playTrackDirect(${i})">
        <div class="thumb-wrap">
          <img src="${thumb(t.id)}" alt="${t.title}" loading="lazy">
          <div class="play-overlay"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        </div>
        <div class="track-info">
          <div class="track-title">${t.title}</div>
          <div class="track-meta">${t.duration}</div>
        </div>
        <div class="track-actions" onclick="event.stopPropagation()">
          <button class="add-btn" onclick="togglePlaylist(${i})" title="${sel ? 'Entfernen' : 'Zur Playlist'}">${sel ? '✓' : '+'}</button>
        </div>
      </div>`;
  }).join('');
}

function renderPlaylist() {
  const empty = document.getElementById('playlist-empty');
  const content = document.getElementById('playlist-content');
  const list = document.getElementById('playlist-list');
  const badge = document.getElementById('playlist-badge');
  if (playlist.length === 0) {
    empty.style.display = 'block'; content.style.display = 'none'; badge.style.display = 'none';
  } else {
    empty.style.display = 'none'; content.style.display = 'block';
    badge.style.display = 'inline'; badge.textContent = playlist.length;
    list.innerHTML = playlist.map((id, qi) => {
      const t = TRACKS.find(x => x.id === id);
      if (!t) return '';
      const playing = (queueIdx === qi && currentTrackIdx !== null);
      return `
        <div class="playlist-track ${playing ? 'playing-now' : ''}" onclick="playFromQueue(${qi})">
          <div class="playlist-num">${qi + 1}</div>
          <img class="playlist-thumb" src="${thumb(t.id)}" alt="">
          <div class="playlist-info">
            <div class="playlist-title">${t.title}</div>
            <div class="playlist-duration">${t.duration}</div>
          </div>
          <button class="remove-btn" onclick="event.stopPropagation(); removeFromPlaylist('${id}')">×</button>
        </div>`;
    }).join('');
  }
}

function togglePlaylist(i) {
  const id = TRACKS[i].id;
  playlist.includes(id) ? playlist = playlist.filter(x => x !== id) : playlist.push(id);
  renderTracks(); renderPlaylist();
}
function removeFromPlaylist(id) { playlist = playlist.filter(x => x !== id); renderTracks(); renderPlaylist(); }
function clearPlaylist() { playlist = []; queueIdx = null; renderTracks(); renderPlaylist(); }

function playTrackDirect(i) { currentTrackIdx = i; queueIdx = null; loadAndPlay(TRACKS[i]); renderTracks(); renderPlaylist(); }
function playFromQueue(qi) {
  queueIdx = qi;
  const t = TRACKS.find(x => x.id === playlist[qi]);
  if (!t) return;
  currentTrackIdx = TRACKS.indexOf(t);
  loadAndPlay(t); renderTracks(); renderPlaylist();
}
function playAll() { if (playlist.length === 0) return; playFromQueue(0); showTab('playlist'); }
function loadAndPlay(track) {
  if (!ytReady) { return; }
  ytPlayer.loadVideoById(track.id);
  updatePlayerBar(track);
}
function togglePlay() {
  if (!ytReady || currentTrackIdx === null) return;
  isPlaying ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
}
function nextTrack() {
  if (queueIdx !== null && playlist.length > 0 && queueIdx + 1 < playlist.length) { playFromQueue(queueIdx + 1); return; }
  if (currentTrackIdx !== null && currentTrackIdx + 1 < TRACKS.length) playTrackDirect(currentTrackIdx + 1);
}
function prevTrack() {
  if (queueIdx !== null && queueIdx > 0) { playFromQueue(queueIdx - 1); return; }
  if (currentTrackIdx !== null && currentTrackIdx > 0) playTrackDirect(currentTrackIdx - 1);
}

function updatePlayerBar(track) {
  document.getElementById('now-thumb').src = thumb(track.id);
  document.getElementById('now-title').textContent = track.title;
  document.getElementById('now-status').textContent = '⏳ Lädt…';
}
function setPlayIcon(playing) {
  const btn = document.getElementById('play-pause-btn');
  btn.innerHTML = playing
    ? `<svg viewBox="0 0 24 24" style="width:32px;height:32px;fill:currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`
    : `<svg viewBox="0 0 24 24" style="width:32px;height:32px;fill:currentColor"><path d="M8 5v14l11-7z"/></svg>`;
  document.getElementById('now-status').textContent = playing ? '♫ Spielt gerade' : '⏸ Pausiert';
}

let progressTimer = null;
function startProgressUpdate() {
  stopProgressUpdate();
  progressTimer = setInterval(() => {
    if (!ytReady || !ytPlayer.getDuration) return;
    const dur = ytPlayer.getDuration(), cur = ytPlayer.getCurrentTime();
    if (dur > 0) document.getElementById('progress-fill').style.width = (cur / dur * 100) + '%';
  }, 500);
}
function stopProgressUpdate() { if (progressTimer) { clearInterval(progressTimer); progressTimer = null; } }

function seekTo(e) {
  if (!ytReady || currentTrackIdx === null) return;
  const ratio = e.offsetX / e.currentTarget.offsetWidth;
  const dur = ytPlayer.getDuration();
  if (dur > 0) ytPlayer.seekTo(ratio * dur, true);
}

function showTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelector(`[onclick="showTab('${name}')"]`).classList.add('active');
}

loadChannelTracks();
renderPlaylist();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
