<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sonisanantes – Musik</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#120820">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Soni Musik">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #120820;
      --surface: #1e1030;
      --surface2: #2a1845;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --text: #f0e8ff;
      --text-dim: #9c87b8;
      --accent: #7c3aed;
      --accent-soft: #4c1d95;
      --player-h: 120px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid #2a1845;
      padding: 16px 20px 12px;
    }
    .logo {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 4px;
    }
    header h1 {
      font-size: 20px;
      font-weight: 300;
      color: var(--text);
      letter-spacing: 1px;
    }
    header h1 span { color: var(--gold); font-weight: 600; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 0;
      margin: 0 20px 0;
      border-bottom: 1px solid var(--surface2);
    }
    .tab-btn {
      flex: 1;
      padding: 12px 8px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }
    .tab-btn .badge {
      display: inline-block;
      background: var(--gold);
      color: #120820;
      font-size: 10px;
      font-weight: 700;
      border-radius: 10px;
      padding: 1px 6px;
      margin-left: 5px;
    }

    /* ── Main scroll area ── */
    main {
      padding-bottom: calc(var(--player-h) + var(--safe-bottom) + 20px);
    }

    /* ── Track list ── */
    .section-label {
      padding: 16px 20px 8px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .track-list { padding: 0 12px; }

    .track-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 8px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .track-card:active { background: var(--surface2); }
    .track-card.playing { background: var(--surface); }
    .track-card.selected { background: linear-gradient(90deg, #2a1845 0%, #1e1030 100%); }

    .thumb-wrap {
      position: relative;
      flex-shrink: 0;
      width: 60px;
      height: 60px;
      border-radius: 8px;
      overflow: hidden;
    }
    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .thumb-wrap .play-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .track-card.playing .play-overlay { opacity: 1; }
    .play-overlay svg { width: 24px; height: 24px; fill: #fff; }

    .track-info { flex: 1; min-width: 0; }
    .track-title {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .track-meta {
      font-size: 12px;
      color: var(--text-dim);
    }

    .track-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .add-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1.5px solid var(--text-dim);
      background: none;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 18px;
      line-height: 1;
    }
    .track-card.selected .add-btn {
      background: var(--gold);
      border-color: var(--gold);
      color: #120820;
      font-size: 14px;
    }

    /* ── Playlist tab ── */
    .playlist-empty {
      text-align: center;
      padding: 60px 30px;
      color: var(--text-dim);
    }
    .playlist-empty .icon { font-size: 48px; margin-bottom: 16px; }
    .playlist-empty p { font-size: 14px; line-height: 1.6; }

    .playlist-controls {
      display: flex;
      gap: 10px;
      padding: 12px 20px;
    }
    .btn-sm {
      padding: 8px 16px;
      border-radius: 20px;
      border: none;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 0.5px;
    }
    .btn-play-all {
      background: var(--gold);
      color: #120820;
      font-weight: 600;
      flex: 1;
    }
    .btn-clear {
      background: var(--surface2);
      color: var(--text-dim);
    }

    .playlist-track {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      margin: 0 12px 4px;
      border-radius: 10px;
      background: var(--surface);
      cursor: pointer;
      transition: background 0.15s;
    }
    .playlist-track.playing-now { background: var(--surface2); border: 1px solid var(--gold-light)33; }
    .playlist-num { font-size: 11px; color: var(--text-dim); width: 18px; text-align: center; flex-shrink: 0; }
    .playlist-thumb { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
    .playlist-info { flex: 1; min-width: 0; }
    .playlist-title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .playlist-duration { font-size: 11px; color: var(--text-dim); }
    .remove-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      flex-shrink: 0;
    }

    /* ── Player bar ── */
    #player-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: calc(var(--player-h) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: var(--surface);
      border-top: 1px solid var(--surface2);
      box-shadow: 0 -8px 30px rgba(0,0,0,0.4);
      z-index: 200;
      display: flex;
      flex-direction: column;
    }
    .player-progress {
      height: 3px;
      background: var(--surface2);
      cursor: pointer;
      flex-shrink: 0;
    }
    .player-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      width: 0%;
      transition: width 0.5s linear;
      pointer-events: none;
    }
    .player-inner {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      flex: 1;
    }
    #now-thumb {
      width: 50px;
      height: 50px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
    }
    .now-info { flex: 1; min-width: 0; }
    #now-title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    #now-status { font-size: 11px; color: var(--text-dim); }

    .controls {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .ctrl-btn {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .ctrl-btn:active { background: var(--surface2); }
    .ctrl-btn svg { width: 22px; height: 22px; fill: currentColor; }
    .ctrl-btn.main { color: var(--gold); }
    .ctrl-btn.main svg { width: 36px; height: 36px; }

    /* ── Hidden YouTube player ── */
    #yt-player { position: fixed; width: 1px; height: 1px; top: -1px; left: -1px; opacity: 0; pointer-events: none; }

    /* ── Tab panels ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>

<header>
  <div class="logo">Sonisanantes</div>
  <h1>Meine <span>Musik</span></h1>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('alle')">Alle Tracks</button>
  <button class="tab-btn" onclick="showTab('playlist')" id="tab-playlist-btn">
    Meine Playlist <span class="badge" id="playlist-badge" style="display:none">0</span>
  </button>
</div>

<main>
  <div class="tab-panel active" id="tab-alle">
    <div class="section-label">Alle Veröffentlichungen</div>
    <div class="track-list" id="track-list"></div>
  </div>

  <div class="tab-panel" id="tab-playlist">
    <div id="playlist-empty" class="playlist-empty">
      <div class="icon">🎵</div>
      <p>Klicke auf <strong>+</strong> bei einem Track,<br>um ihn deiner Playlist hinzuzufügen.</p>
    </div>
    <div id="playlist-content" style="display:none">
      <div class="playlist-controls">
        <button class="btn-sm btn-play-all" onclick="playAll()">▶ Alles abspielen</button>
        <button class="btn-sm btn-clear" onclick="clearPlaylist()">Leeren</button>
      </div>
      <div id="playlist-list"></div>
    </div>
  </div>
</main>

<!-- Player bar -->
<div id="player-bar">
  <div class="player-progress" id="progress-bar" onclick="seekTo(event)">
    <div class="player-progress-fill" id="progress-fill"></div>
  </div>
  <div class="player-inner">
    <img id="now-thumb" src="" alt="">
    <div class="now-info">
      <div id="now-title">Kein Track ausgewählt</div>
      <div id="now-status">Tippe auf einen Track zum Starten</div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="prevTrack()" title="Zurück">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn main" id="play-pause-btn" onclick="togglePlay()">
        <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="nextTrack()" title="Weiter">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2.5-6 8.5 6V6L8.5 12zM16 6h2v12h-2z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Hidden YouTube Player container -->
<div id="yt-player"></div>

<script>
const YT_API_KEY = 'AIzaSyA2R2drwdoSrSQ-WJzwZ5WcBZQggD8Z0cM';
const YT_CHANNEL_HANDLE = '@sonisanantes';
let TRACKS = [];

function parseDuration(iso) {
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return '';
  const h = parseInt(m[1] || 0), min = parseInt(m[2] || 0), s = parseInt(m[3] || 0);
  if (h > 0) return `${h}:${String(min).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${min}:${String(s).padStart(2,'0')}`;
}

async function loadChannelTracks() {
  const listEl = document.getElementById('track-list');
  listEl.innerHTML = '<div style="padding:20px;color:var(--text-dim)">Tracks werden geladen…</div>';
  try {
    // 1. Channel-ID über Handle ermitteln
    const chRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=contentDetails&forHandle=sonisanantes&key=${YT_API_KEY}`);
    const chData = await chRes.json();
    const uploadsId = chData.items[0].contentDetails.relatedPlaylists.uploads;

    // 2. Alle Videos aus der Uploads-Playlist holen (bis zu 50)
    let videos = [], pageToken = '';
    do {
      const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadsId}&maxResults=50&pageToken=${pageToken}&key=${YT_API_KEY}`;
      const res = await fetch(url);
      const data = await res.json();
      videos = videos.concat(data.items || []);
      pageToken = data.nextPageToken || '';
    } while (pageToken);

    // 3. Dauer für alle Videos holen (je 50er Batch)
    const ids = videos.map(v => v.snippet.resourceId.videoId);
    const durations = {};
    for (let i = 0; i < ids.length; i += 50) {
      const batch = ids.slice(i, i + 50).join(',');
      const dRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${batch}&key=${YT_API_KEY}`);
      const dData = await dRes.json();
      (dData.items || []).forEach(v => { durations[v.id] = parseDuration(v.contentDetails.duration); });
    }

    TRACKS = videos.map(v => ({
      id: v.snippet.resourceId.videoId,
      title: v.snippet.title,
      duration: durations[v.snippet.resourceId.videoId] || '',
    }));

    renderTracks();
  } catch (err) {
    listEl.innerHTML = `<div style="padding:20px;color:#f87171">Fehler beim Laden: ${err.message}</div>`;
  }
}

// Thumbnail-URL aus Video-ID erzeugen
function thumb(id) {
  return `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
}

// ── State ──
let ytPlayer = null;
let ytReady = false;
let currentTrackIdx = null;   // Index in TRACKS
let playlist = [];             // Array von Track-IDs in der Playlist
let isPlaying = false;
let queueIdx = null;           // Index in playlist während Wiedergabe

// ── YouTube IFrame API laden ──
const tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

window.onYouTubeIframeAPIReady = function() {
  ytPlayer = new YT.Player('yt-player', {
    height: '1',
    width: '1',
    playerVars: { autoplay: 0, controls: 0, modestbranding: 1 },
    events: {
      onReady: () => { ytReady = true; },
      onStateChange: onPlayerStateChange,
    }
  });
};

function onPlayerStateChange(e) {
  if (e.data === YT.PlayerState.PLAYING) {
    isPlaying = true;
    setPlayIcon(true);
    startProgressUpdate();
  } else if (e.data === YT.PlayerState.PAUSED) {
    isPlaying = false;
    setPlayIcon(false);
    stopProgressUpdate();
  } else if (e.data === YT.PlayerState.ENDED) {
    nextTrack();
  }
}

// ── Render track list ──
function renderTracks() {
  const list = document.getElementById('track-list');
  list.innerHTML = TRACKS.map((t, i) => {
    const sel = playlist.includes(t.id);
    const playing = currentTrackIdx === i;
    return `
      <div class="track-card ${sel ? 'selected' : ''} ${playing ? 'playing' : ''}" id="card-${i}" onclick="playTrackDirect(${i})">
        <div class="thumb-wrap">
          <img src="${thumb(t.id)}" alt="${t.title}" loading="lazy">
          <div class="play-overlay">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </div>
        <div class="track-info">
          <div class="track-title">${t.title}</div>
          <div class="track-meta">${t.duration}</div>
        </div>
        <div class="track-actions" onclick="event.stopPropagation()">
          <button class="add-btn" onclick="togglePlaylist(${i})" title="${sel ? 'Entfernen' : 'Zur Playlist'}">
            ${sel ? '✓' : '+'}
          </button>
        </div>
      </div>`;
  }).join('');
}

// ── Render playlist ──
function renderPlaylist() {
  const empty = document.getElementById('playlist-empty');
  const content = document.getElementById('playlist-content');
  const list = document.getElementById('playlist-list');
  const badge = document.getElementById('playlist-badge');

  if (playlist.length === 0) {
    empty.style.display = 'block';
    content.style.display = 'none';
    badge.style.display = 'none';
  } else {
    empty.style.display = 'none';
    content.style.display = 'block';
    badge.style.display = 'inline';
    badge.textContent = playlist.length;

    list.innerHTML = playlist.map((id, qi) => {
      const t = TRACKS.find(x => x.id === id);
      if (!t) return '';
      const playing = (queueIdx === qi && currentTrackIdx !== null);
      return `
        <div class="playlist-track ${playing ? 'playing-now' : ''}" onclick="playFromQueue(${qi})">
          <div class="playlist-num">${qi + 1}</div>
          <img class="playlist-thumb" src="${thumb(t.id)}" alt="">
          <div class="playlist-info">
            <div class="playlist-title">${t.title}</div>
            <div class="playlist-duration">${t.duration}</div>
          </div>
          <button class="remove-btn" onclick="event.stopPropagation(); removeFromPlaylist('${id}')">×</button>
        </div>`;
    }).join('');
  }
}

// ── Playlist logic ──
function togglePlaylist(i) {
  const id = TRACKS[i].id;
  if (playlist.includes(id)) {
    playlist = playlist.filter(x => x !== id);
  } else {
    playlist.push(id);
  }
  renderTracks();
  renderPlaylist();
}

function removeFromPlaylist(id) {
  playlist = playlist.filter(x => x !== id);
  renderTracks();
  renderPlaylist();
}

function clearPlaylist() {
  playlist = [];
  queueIdx = null;
  renderTracks();
  renderPlaylist();
}

// ── Playback ──
function playTrackDirect(i) {
  currentTrackIdx = i;
  queueIdx = null;
  loadAndPlay(TRACKS[i]);
  renderTracks();
  renderPlaylist();
}

function playFromQueue(qi) {
  queueIdx = qi;
  const id = playlist[qi];
  const t = TRACKS.find(x => x.id === id);
  if (!t) return;
  currentTrackIdx = TRACKS.indexOf(t);
  loadAndPlay(t);
  renderTracks();
  renderPlaylist();
}

function playAll() {
  if (playlist.length === 0) return;
  playFromQueue(0);
  showTab('playlist');
}

function loadAndPlay(track) {
  if (!ytReady) { alert('Player lädt noch, bitte kurz warten…'); return; }
  ytPlayer.loadVideoById(track.id);
  updatePlayerBar(track);
}

function togglePlay() {
  if (!ytReady || currentTrackIdx === null) return;
  if (isPlaying) { ytPlayer.pauseVideo(); }
  else { ytPlayer.playVideo(); }
}

function nextTrack() {
  if (queueIdx !== null && playlist.length > 0) {
    const next = queueIdx + 1;
    if (next < playlist.length) { playFromQueue(next); return; }
  }
  if (currentTrackIdx !== null && currentTrackIdx + 1 < TRACKS.length) {
    playTrackDirect(currentTrackIdx + 1);
  }
}

function prevTrack() {
  if (queueIdx !== null && queueIdx > 0) { playFromQueue(queueIdx - 1); return; }
  if (currentTrackIdx !== null && currentTrackIdx > 0) {
    playTrackDirect(currentTrackIdx - 1);
  }
}

// ── Player bar ──
function updatePlayerBar(track) {
  document.getElementById('now-thumb').src = thumb(track.id);
  document.getElementById('now-title').textContent = track.title;
  document.getElementById('now-status').textContent = '⏳ Lädt…';
}

function setPlayIcon(playing) {
  const btn = document.getElementById('play-pause-btn');
  btn.innerHTML = playing
    ? `<svg id="play-icon" viewBox="0 0 24 24" style="width:36px;height:36px;fill:currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`
    : `<svg id="play-icon" viewBox="0 0 24 24" style="width:36px;height:36px;fill:currentColor"><path d="M8 5v14l11-7z"/></svg>`;
  document.getElementById('now-status').textContent = playing ? '♫ Spielt gerade' : '⏸ Pausiert';
}

// ── Progress bar ──
let progressTimer = null;
function startProgressUpdate() {
  stopProgressUpdate();
  progressTimer = setInterval(() => {
    if (!ytReady || !ytPlayer.getDuration) return;
    const dur = ytPlayer.getDuration();
    const cur = ytPlayer.getCurrentTime();
    if (dur > 0) {
      document.getElementById('progress-fill').style.width = (cur / dur * 100) + '%';
    }
  }, 500);
}
function stopProgressUpdate() {
  if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
}

function seekTo(e) {
  if (!ytReady || currentTrackIdx === null) return;
  const bar = e.currentTarget;
  const ratio = e.offsetX / bar.offsetWidth;
  const dur = ytPlayer.getDuration();
  if (dur > 0) ytPlayer.seekTo(ratio * dur, true);
}

// ── Tabs ──
function showTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelector(`[onclick="showTab('${name}')"]`).classList.add('active');
}

// ── Init ──
loadChannelTracks();
renderPlaylist();

// Service Worker registrieren
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
